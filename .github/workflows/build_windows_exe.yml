name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:       # allow manual trigger from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install Python deps + PyInstaller ─────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf pdf2image Pillow pytesseract pyinstaller

      # ── 4. Download Poppler for Windows (required by pdf2image) ───────────────
      - name: Download & extract Poppler
        shell: pwsh
        run: |
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip"
          Invoke-WebRequest -Uri $url -OutFile poppler.zip
          Expand-Archive -Path poppler.zip -DestinationPath poppler_extracted
          $binDir = Get-ChildItem -Path poppler_extracted -Recurse -Directory -Filter "bin" | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path poppler | Out-Null
          Copy-Item -Path "$($binDir.FullName)\*" -Destination poppler -Recurse
          Write-Host "Poppler files copied: $((Get-ChildItem poppler).Count)"

      # ── 5. Install Tesseract OCR (required for scanned PDF detection) ─────────
      - name: Install & stage Tesseract
        shell: pwsh
        run: |
          choco install tesseract --no-progress -y
          $tessDir = "C:\Program Files\Tesseract-OCR"
          New-Item -ItemType Directory -Force -Path tesseract | Out-Null
          Copy-Item -Path "$tessDir\*" -Destination tesseract -Recurse
          Write-Host "Tesseract files staged: $((Get-ChildItem tesseract -Recurse -File).Count)"

      # ── 6. Build the exe ─────────────────────────────────────────────────────
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "PDFSplitter" `
            --hidden-import pypdf `
            --hidden-import pdf2image `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.JpegImagePlugin `
            --hidden-import pytesseract `
            --hidden-import license_manager `
            --add-data "poppler;poppler" `
            --add-data "tesseract;tesseract" `
            pdf_splitter_gui.py

      # ── 7. Stage distribution folder (exe + license side-by-side) ────────────
      - name: Stage distribution package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist\PDFSplitter.exe release\
          Copy-Item license.lic           release\
          Write-Host "Release contents:"
          Get-ChildItem release

      # ── 8. Upload artifact zip ────────────────────────────────────────────────
      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFSplitter-Windows
          path: release\
          retention-days: 30
